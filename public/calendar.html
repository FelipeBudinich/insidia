<!doctype html>
<html lang="en" aria-busy="true">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Live fictional calendar."><title>Fictional Calendar</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body><div class="page-shell">
  <nav class="primary-nav" aria-label="Navigation">
    <a data-page-link="calendar" href="/calendar.html" aria-current="page"></a>
    <a data-page-link="outcome" href="/outcome.html"></a><a data-page-link="weather" href="/weather.html"></a>
  </nav>
  <main class="container">
    <section class="calendar-card" aria-labelledby="page-title">
      <header class="heading"><p id="page-title" data-message-key="page.calendar"></p><span class="version" data-version>v7.1</span></header>
      <div class="date"><p id="fictional-year" class="year"></p><p id="fictional-period" class="period"></p><p id="fictional-date-accessible" class="visually-hidden"></p></div>
      <p id="fictional-time" class="primary-clock">00:00:00</p>
      <p id="fictional-metadata" class="metadata"></p>
    </section>
    <section class="lunar-section" aria-labelledby="lunar-heading">
      <p id="lunar-heading" class="section-label" data-message-key="section.lunar"></p>
      <p class="group-label" data-message-key="label.phase"></p><p id="lunar-phase" class="lunar-name"></p><p id="lunar-metadata" class="lunar-metadata"></p>
    </section>
    <details class="json-details"><summary data-message-key="section.json"></summary><div class="json-content">
      <div class="json-toolbar"><button id="copy-json" type="button" data-message-key="label.copyJson"></button><span id="copy-status" class="copy-status" role="status" aria-live="polite"></span></div>
      <pre id="json-output" tabindex="0">{}</pre>
    </div></details>
    <footer><span data-universe-name></span> · <span data-epoch></span></footer>
  </main>
</div><script type="module" src="/calendar-page.js"></script></body>
</html>
