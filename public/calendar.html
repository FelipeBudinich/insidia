<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A live browser-calculated fictional calendar with lunar cycle details and complete JSON output.">
    <title>Calendar · Insidia</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <nav class="primary-nav" aria-label="Primary">
        <a href="/calendar.html" aria-current="page">Calendar</a>
        <a href="/outcome.html">Outcome</a>
        <a href="/weather.html">Weather</a>
      </nav>
      <main class="container">
      <section class="calendar-card" aria-labelledby="page-title">
        <header class="heading">
          <p id="page-title">Fictional Calendar</p>
          <span class="version" aria-label="Application version 6.4">v6.4</span>
        </header>

        <div class="date">
          <p id="fictional-year" class="year">Year 1</p>
          <p id="fictional-period" class="period">Month 1 · Day 1</p>
          <p id="fictional-date-accessible" class="visually-hidden">Year 1 · Month 1 · Day 1</p>
        </div>
        <p id="fictional-metadata" class="metadata">Week 1 · Day 1 of 7 · Day 1 of 353</p>
      </section>

      <section class="lunar-section" aria-labelledby="lunar-heading">
        <p id="lunar-heading" class="section-label">Lunar Cycle</p>
        <p class="group-label">Phase</p>
        <p id="lunar-phase" class="lunar-name">Rebirth</p>
        <p id="lunar-metadata" class="lunar-metadata">Lunar Day 1 of 13 · Cycle 1</p>
      </section>

      <details class="json-details">
        <summary>JSON output</summary>
        <div class="json-content">
          <div class="json-toolbar">
            <button id="copy-json" type="button">Copy JSON</button>
            <span id="copy-status" class="copy-status" role="status" aria-live="polite"></span>
          </div>
          <pre id="json-output" tabindex="0">{}</pre>
        </div>
      </details>

      <footer>Epoch: 1970-01-01 00:00:00 UTC</footer>
      </main>
    </div>
    <script type="module" src="/calendar-page.js"></script>
  </body>
</html>
