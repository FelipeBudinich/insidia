<!doctype html>
<html lang="en" aria-busy="true">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Live fictional weather state."><title>Weather</title><link rel="stylesheet" href="/styles.css"></head>
<body><div class="page-shell">
  <nav class="primary-nav" aria-label="Navigation"><a data-page-link="calendar" href="/calendar.html"></a><a data-page-link="outcome" href="/outcome.html"></a><a data-page-link="weather" href="/weather.html" aria-current="page"></a></nav>
  <main class="container">
    <header class="page-header"><div><p class="page-kicker" data-application-name></p><h1 data-message-key="page.weather"></h1></div><span class="version" data-version>v8</span></header>
    <section class="time-section focused-section" aria-labelledby="time-heading"><p id="time-heading" class="section-label" data-message-key="section.time"></p><div class="time-grid">
      <div class="time-item"><p class="group-label" data-message-key="label.currentFictionalTime"></p><p id="fictional-time" class="weather-clock">00:00:00</p></div>
      <div class="time-item"><p class="group-label" data-message-key="label.currentLunarTime"></p><p id="lunar-time" class="weather-clock">00:00:00</p></div>
    </div></section>
    <section class="season-section focused-section" aria-labelledby="season-heading"><p id="season-heading" class="section-label" data-message-key="section.season"></p><p class="season-name" data-season-name></p><p class="season-metadata" data-season-metadata></p><p class="season-cycle-metadata" data-season-cycle-metadata></p><p class="season-cycle-metadata" data-season-next></p><div class="weather-progress"><div class="weather-progress-heading"><span data-season-progress></span></div><progress max="1" value="0" data-season-progress-bar></progress></div></section>
    <section class="progress-section" aria-labelledby="progress-heading"><p id="progress-heading" class="section-label" data-message-key="section.progress"></p><div class="progress-grid">
      <div class="progress-item"><div class="progress-heading-row"><label for="lunar-day-progress" data-message-key="label.currentLunarDay"></label><span id="lunar-day-progress-value">0.000000%</span></div><progress id="lunar-day-progress" max="100" value="0"></progress></div>
      <div class="progress-item"><div class="progress-heading-row"><label for="day-progress" data-message-key="label.currentDay"></label><span id="day-progress-value">0.000000%</span></div><progress id="day-progress" max="100" value="0"></progress></div>
      <div class="progress-item"><div class="progress-heading-row"><label for="hour-progress" data-message-key="label.currentHour"></label><span id="hour-progress-value">0.000000%</span></div><progress id="hour-progress" max="100" value="0"></progress></div>
    </div></section>
    <footer><span data-application-name></span> · <span data-epoch></span></footer>
  </main>
</div><script type="module" src="/weather-page.js"></script></body>
</html>
