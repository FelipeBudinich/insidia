<!doctype html>
<html lang="en" aria-busy="true">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Live fictional time and season state."><title>…</title><link rel="stylesheet" href="/styles.css"></head>
<body><div class="page-shell">
  <nav class="primary-nav" aria-label="Navigation"><a data-page-id="page-01" href="/calendario.html"></a><a data-page-id="page-02" href="/destino.html"></a><a data-page-id="page-03" href="/tempore.html" aria-current="page"></a></nav>
  <main class="container">
    <h1 id="page-heading" class="visually-hidden" data-page-name></h1>
    <section class="time-section" aria-labelledby="time-heading"><p id="time-heading" class="section-label" data-message-key="section.time"></p><div class="time-grid">
      <div class="time-item"><p class="group-label" data-message-key="label.currentFictionalTime"></p><p id="fictional-time" class="weather-clock">00:00:00</p></div>
      <div class="time-item"><p class="group-label" data-message-key="label.currentLunarTime"></p><p id="lunar-time" class="weather-clock">00:00:00</p></div>
    </div></section>
    <section class="season-section" aria-labelledby="season-heading"><p id="season-heading" class="section-label" data-message-key="section.season"></p><p class="season-name" data-season-name></p><p class="season-metadata" data-season-metadata></p><p class="season-cycle-metadata" data-season-cycle-metadata></p><p class="season-cycle-metadata" data-season-next></p><div class="weather-progress"><div class="weather-progress-heading"><span data-season-progress></span></div><progress max="1" value="0" data-season-progress-bar></progress></div></section>
    <section class="progress-section" aria-labelledby="progress-heading"><p id="progress-heading" class="section-label" data-message-key="section.progress"></p><div class="progress-grid">
      <div class="progress-item"><div class="progress-heading-row"><label for="lunar-day-progress" data-message-key="label.currentLunarDay"></label><span id="lunar-day-progress-value">0.000000%</span></div><progress id="lunar-day-progress" max="100" value="0"></progress></div>
      <div class="progress-item"><div class="progress-heading-row"><label for="day-progress" data-message-key="label.currentDay"></label><span id="day-progress-value">0.000000%</span></div><progress id="day-progress" max="100" value="0"></progress></div>
      <div class="progress-item"><div class="progress-heading-row"><label for="hour-progress" data-message-key="label.currentHour"></label><span id="hour-progress-value">0.000000%</span></div><progress id="hour-progress" max="100" value="0"></progress></div>
    </div></section>
    <footer><span data-application-name></span><span aria-hidden="true"> · </span><span data-epoch></span><span aria-hidden="true"> · </span><span class="version footer-version" data-version>v8.14</span></footer>
  </main>
</div><script type="module" src="/tempore-page.js"></script></body>
</html>
